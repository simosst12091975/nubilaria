- name: Clean and Install System-Wide Node.js 22.16.0
  hosts: all
  become: yes
  tasks:
    - name: Remove any existing Node.js packages
      ansible.builtin.dnf:
        name: [nodejs, npm]
        state: absent

    - name: Reset Node.js module stream
      # Essential for Oracle Linux 9 to bypass default AppStream versions
      ansible.builtin.command: dnf module reset nodejs -y
      changed_when: false

    - name: Add NodeSource repository for Node 22
      # Fixed URL for the setup script
      ansible.builtin.shell: curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
      args:
        creates: /etc/yum.repos.d/nodesource-el9.repo

    - name: Install pinned version 22.16.0
      ansible.builtin.dnf:
        # Standard pinning format for NodeSource on EL9
        name: nodejs-22.16.0-1nodesource1
        state: present
        allow_erasing: yes
        disable_plugin: [subscription-manager]

    - name: Verify global installation
      ansible.builtin.command: node -v
      register: node_version
      changed_when: false

    - name: Debug result
      ansible.builtin.debug:
        msg: "Success! System-wide Node.js is now version: {{ node_version.stdout }}"
