---
- name: Finalize Nginx 1.22.1 Installation
  hosts: all
  become: yes

  tasks:
    - name: Download Nginx RPM to Semaphore Runner
      delegate_to: localhost
      become: no
      ansible.builtin.get_url:
        url: "https://nginx.org"
        dest: "/tmp/nginx-1.22.1.rpm"
      register: rpm_download
      ignore_errors: yes

    - name: Fail if RPM could not be downloaded
      fail:
        msg: "Semaphore runner cannot reach nginx.org. Please upload the RPM to your Git repo manually."
      when: rpm_download is failed and not query('file', '/tmp/nginx-1.22.1.rpm')

    - name: Transfer RPM to target server
      ansible.builtin.copy:
        src: "/tmp/nginx-1.22.1.rpm"
        dest: "/tmp/nginx-1.22.1.rpm"
        mode: '0644'

    - name: Install Nginx from the transferred file
      ansible.builtin.dnf:
        name: "/tmp/nginx-1.22.1.rpm"
        state: present
        disable_gpg_check: yes

    - name: Start and Enable Nginx
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: yes

    - name: Verify Version
      ansible.builtin.command: nginx -v
      register: nginx_ver
      changed_when: false

    - name: Print Version Output
      debug:
        var: nginx_ver.stderr
