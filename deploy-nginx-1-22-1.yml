---
- name: Install Nginx 1.22.1 on RHEL/Derivatives
  hosts: all
  become: yes
  tasks:
    - name: Install yum-utils
      yum:
        name: yum-utils
        state: present

    - name: Configure Nginx Repository
      copy:
        dest: /etc/yum.repos.d/nginx.repo
        content: |
          [nginx-stable]
          name=nginx stable repo
          baseurl=https://nginx.org
          gpgcheck=1
          enabled=1
          gpgkey=https://nginx.org
          module_hotfixes=true

    - name: Import Nginx GPG Key
      rpm_key:
        state: present
        key: https://nginx.org

    - name: Install Nginx 1.22.1
      yum:
        name: nginx-1.22.1
        state: present
        update_cache: yes

    - name: Ensure Nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Open HTTP port in firewalld (optional)
      firewalld:
        service: http
        permanent: yes
        state: enabled
      ignore_errors: yes
