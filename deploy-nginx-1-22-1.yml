---
- name: Install Nginx 1.22.1 on Oracle Linux 9 (Direct RPM)
  hosts: all
  become: yes
  vars:
    # Direct link to the official NGINX 1.22.1 RPM for RHEL/Oracle 9
    nginx_rpm_url: "https://nginx.org"

  tasks:
    - name: Clean up broken repo files to stop DNF crashes
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/yum.repos.d/nginx.repo
        - /etc/yum.repos.d/nginx-stable.repo

    - name: Disable default OS nginx module
      ansible.builtin.shell: dnf -y module disable nginx
      register: disable_module
      changed_when: "'Disabling' in disable_module.stdout"
      failed_when: false

    - name: Install Nginx 1.22.1 directly from RPM URL
      ansible.builtin.dnf:
        name: "{{ nginx_rpm_url }}"
        state: present
        disable_gpg_check: yes # Bypasses the GPG key download issue

    - name: Ensure Nginx is started and enabled
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: yes
