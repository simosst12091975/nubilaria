---
- name: Install Nginx 1.22.1 on Oracle Linux 9
  hosts: all
  become: yes
  vars:
    nginx_version: "1.22.1"
    nginx_type: "stable"
    nginx_manage_repo: true
    # ADD THIS LINE TO FIX THE FINGERPRINT ERROR:
    nginx_gpg_fingerprint: "573BFD6B3D8FBC641079A6ABABF5BD827BD9BF62"

  tasks:
    - name: Remove broken repo file
      ansible.builtin.file:
        path: /etc/yum.repos.d/nginx.repo
        state: absent

    - name: Disable default OS nginx module
      ansible.builtin.shell: dnf -y module disable nginx
      register: disable_module
      changed_when: "'Disabling' in disable_module.stdout"
      failed_when: false

    - name: Install yum-utils
      ansible.builtin.dnf:
        name: yum-utils
        state: present

    - name: Deploy Nginx using official role
      include_role:
        name: nginxinc.nginx_core.nginx

    - name: Ensure Nginx is started and enabled
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: yes
