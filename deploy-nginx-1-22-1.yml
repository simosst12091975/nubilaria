---
- name: Install Nginx 1.22.1 (Offline Method)
  hosts: all
  become: yes

  tasks:
    - name: Clean up old repo files to prevent DNF metadata errors
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/yum.repos.d/nginx.repo
        - /etc/yum.repos.d/nginx-stable.repo

    - name: Disable default OS nginx module
      ansible.builtin.shell: dnf -y module disable nginx
      register: disable_module
      changed_when: "'Disabling' in disable_module.stdout"
      failed_when: false

    - name: Download NGINX RPM to Semaphore Runner
      delegate_to: localhost
      become: no
      ansible.builtin.get_url:
        url: "https://nginx.org"
        dest: "/tmp/nginx-1.22.1.rpm"
      # If your Semaphore runner also has no internet, you must 
      # manually place this file in your git repo and use 'copy' instead.

    - name: Copy RPM to target server
      ansible.builtin.copy:
        src: "/tmp/nginx-1.22.1.rpm"
        dest: "/tmp/nginx-1.22.1.rpm"
        mode: '0644'

    - name: Install Nginx from local file
      ansible.builtin.dnf:
        name: "/tmp/nginx-1.22.1.rpm"
        state: present
        disable_gpg_check: yes

    - name: Ensure Nginx is started and enabled
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: yes
