---
- name: Deploy Nginx 1.22.1 on Oracle Linux 9
  hosts: all
  become: true
  tasks:
    - name: Remove existing Nginx repository files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/yum.repos.d/nginx.repo
        - /etc/yum.repos.d/nginx-stable.repo

    - name: Remove Nginx GPG signing keys from RPM DB
      ansible.builtin.shell: |
        rpm -qa gpg-pubkey* --qf "%{NAME}-%{VERSION}-%{RELEASE}\t%{SUMMARY}\n" | \
        grep -i "nginx" | awk '{print $1}' | xargs -r rpm -e
      changed_when: false

    - name: Clean DNF cache to ensure fresh metadata
      ansible.builtin.command: dnf clean all
      changed_when: false

    - name: Enable Nginx 1.22 module stream
      ansible.builtin.dnf:
        name: "@nginx:1.22"
        state: present

    - name: Install specific Nginx version 1.22.1
      ansible.builtin.dnf:
        name: "nginx-1.22.1"
        state: present
        disable_gpg_check: false

    - name: Start and enable Nginx service
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true
