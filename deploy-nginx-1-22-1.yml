---
- name: Install Nginx 1.22.1 on RHEL/Derivatives
  hosts: all
  become: yes
  tasks:
    - name: Install yum-utils
      yum:
        name: yum-utils
        state: present

    - name: Create Nginx repository file
      copy:
        dest: /etc/yum.repos.d/nginx.repo
        content: |
          [nginx-stable]
          name=nginx stable repo
          baseurl=https://nginx.org
          gpgcheck=1
          enabled=1
          gpgkey=https://nginx.org
          module_hotfixes=true
        owner: root
        group: root
        mode: '0644'

    - name: Install Nginx 1.22.1
      yum:
        name: nginx-1.22.1
        state: present
        # This flag tells yum to ignore the manual GPG prompt if the key is in the repo file
        disable_gpg_check: no 
        update_cache: yes

    - name: Start and Enable Nginx
      service:
        name: nginx
        state: started
        enabled: yes
